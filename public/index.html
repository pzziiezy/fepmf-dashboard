<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FEPMF Executive Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans Thai", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
    }
    .subtitle {
      margin-top: 6px;
      color: #64748b;
      font-size: 14px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .sync {
      font-size: 13px;
      color: #64748b;
    }
    .btn {
      border: 1px solid #cbd5e1;
      background: white;
      color: #0f172a;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover {
      background: #f8fafc;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 220px 220px;
      gap: 12px;
      margin-bottom: 20px;
    }
    .input, .select {
      width: 100%;
      border: 1px solid #dbe3ef;
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
    }
    .input:focus, .select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(15,23,42,0.04);
    }
    .card .label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .card .value {
      font-size: 30px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1;
    }
    .card .sub {
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
    }
    .layout {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 16px;
    }
    .panel {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      box-shadow: 0 6px 20px rgba(15,23,42,0.04);
      overflow: hidden;
    }
    .panel-head {
      padding: 16px 18px;
      border-bottom: 1px solid #edf2f7;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }
    .panel-sub {
      font-size: 13px;
      color: #64748b;
    }
    .table-wrap {
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .4px;
      background: #f8fafc;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr:hover td {
      background: #fafcff;
    }
    .key {
      font-weight: 700;
      color: #2563eb;
      text-decoration: none;
    }
    .summary {
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 6px;
    }
    .muted {
      color: #64748b;
      font-size: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .b-blue { background: #dbeafe; color: #1d4ed8; }
    .b-green { background: #dcfce7; color: #166534; }
    .b-amber { background: #fef3c7; color: #92400e; }
    .b-red { background: #fee2e2; color: #b91c1c; }
    .b-slate { background: #e2e8f0; color: #334155; }
    .b-purple { background: #ede9fe; color: #6d28d9; }
    .progress {
      width: 100%;
      height: 10px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .progress > div {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      border-radius: 999px;
    }
    .risk-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .section {
      padding: 16px 18px;
      border-top: 1px solid #f1f5f9;
    }
    .mini-list {
      display: grid;
      gap: 10px;
    }
    .mini-item {
      border: 1px solid #eef2f7;
      background: #fafcff;
      border-radius: 12px;
      padding: 12px;
    }
    .mini-item .head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .mini-item .k {
      font-weight: 700;
      color: #2563eb;
      text-decoration: none;
      font-size: 13px;
    }
    .mini-item .t {
      font-size: 13px;
      color: #0f172a;
      line-height: 1.5;
    }
    .empty {
      padding: 24px;
      text-align: center;
      color: #94a3b8;
    }
    .loading {
      padding: 80px 24px;
      text-align: center;
      color: #64748b;
      font-size: 15px;
    }
    @media (max-width: 1200px) {
      .cards { grid-template-columns: repeat(3, 1fr); }
      .layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 800px) {
      .toolbar { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      .topbar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">FEPMF Executive Dashboard</h1>
        <div class="subtitle">Front-End Project Management Framework สำหรับมุมมองผู้บริหาร / PO / PM</div>
      </div>
      <div class="actions">
        <div class="sync" id="syncTime">กำลังโหลด...</div>
        <button class="btn" onclick="loadDashboard()">Refresh</button>
      </div>
    </div>

    <div class="toolbar">
      <input id="searchInput" class="input" placeholder="ค้นหา FEPMF key, summary, child, linked item..." oninput="applyFilters()">
      <select id="squadFilter" class="select" onchange="applyFilters()">
        <option value="">ทุก Squad</option>
        <option value="KEPLER">KEPLER</option>
        <option value="MIDAS">MIDAS</option>
        <option value="NEBULA">NEBULA</option>
      </select>
      <select id="riskFilter" class="select" onchange="applyFilters()">
        <option value="">ทุกสถานะความเสี่ยง</option>
        <option value="blocked">Blocked</option>
        <option value="no_test_case">No Test Case</option>
        <option value="stale_child">Stale Child</option>
        <option value="no_child">No Child</option>
      </select>
    </div>

    <div class="cards" id="summaryCards"></div>

    <div class="layout">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Portfolio Overview</div>
            <div class="panel-sub" id="resultCount">-</div>
          </div>
        </div>
        <div class="table-wrap" id="portfolioWrap">
          <div class="loading">กำลังโหลดข้อมูลจาก Jira...</div>
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">Squad Summary</div>
              <div class="panel-sub">มุมมองภาพรวมตามทีมพัฒนา</div>
            </div>
          </div>
          <div class="section" id="squadSummary"></div>
        </div>

        <div style="height:16px"></div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">Executive Insights</div>
              <div class="panel-sub">สิ่งที่ควรจับตา</div>
            </div>
          </div>
          <div class="section">
            <div class="mini-list" id="insightsList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let dashboardData = null;
    let filteredParents = [];

    function esc(v) {
      return String(v ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function badgeClass(status) {
      const s = String(status || '').toLowerCase();
      if (s.includes('done') || s.includes('deliver')) return 'b-green';
      if (s.includes('uat') || s.includes('test') || s.includes('sit')) return 'b-purple';
      if (s.includes('progress') || s.includes('develop')) return 'b-blue';
      if (s.includes('block')) return 'b-red';
      if (s.includes('plan') || s.includes('prd') || s.includes('idea')) return 'b-amber';
      return 'b-slate';
    }

    function riskBadge(flag) {
      const map = {
        blocked: ['Blocked', 'b-red'],
        no_test_case: ['No Test Case', 'b-amber'],
        stale_child: ['Stale Child', 'b-purple'],
        no_child: ['No Child', 'b-slate']
      };
      const item = map[flag] || [flag, 'b-slate'];
      return `<span class="badge ${item[1]}">${item[0]}</span>`;
    }

    async function fetchDashboard() {
      const r = await fetch('/api/dashboard');
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      return d;
    }

    function renderSummary(summary) {
      const cards = [
        ['Total Parents', summary.totalParents, 'FEPMF ทั้งหมด'],
        ['Children', summary.totalChildren, 'งาน child ที่เชื่อมอยู่'],
        ['Linked', summary.totalLinked, 'linked work items'],
        ['Blocked', summary.parentsBlocked, 'parent ที่ติด blocker'],
        ['No Test', summary.parentsNoTest, 'parent ที่ยังไม่พบ test case'],
        ['Stale Child', summary.staleChildren, 'child ไม่อัปเดตเกิน 7 วัน']
      ];

      document.getElementById('summaryCards').innerHTML = cards.map(c => `
        <div class="card">
          <div class="label">${c[0]}</div>
          <div class="value">${c[1] ?? 0}</div>
          <div class="sub">${c[2]}</div>
        </div>
      `).join('');
    }

    function renderSquadSummary(items) {
      document.getElementById('squadSummary').innerHTML = items.map(x => `
        <div class="mini-item">
          <div class="head">
            <div class="summary">${esc(x.squad)}</div>
            <span class="badge b-blue">${x.total} items</span>
          </div>
          <div class="muted">
            Open ${x.open} · In Progress ${x.inProgress} · Test ${x.test} · UAT ${x.uat} · Done ${x.done} · Blocked ${x.blocked}
          </div>
        </div>
      `).join('');
    }

    function renderInsights(data) {
      const rows = [];

      (data.insights.parentsWithoutChild || []).slice(0, 5).forEach(x => {
        rows.push({
          title: 'Parent ไม่มี Child',
          text: `${x.key} - ${x.summary}`
        });
      });

      (data.insights.parentsWithoutTestCase || []).slice(0, 5).forEach(x => {
        rows.push({
          title: 'Parent ยังไม่พบ Test Case',
          text: `${x.key} - ${x.summary}`
        });
      });

      (data.insights.blockedParents || []).slice(0, 5).forEach(x => {
        rows.push({
          title: 'Parent ติด Block',
          text: `${x.key} - blocked by ${x.blockedBy.join(', ')}`
        });
      });

      (data.insights.staleChildren || []).slice(0, 5).forEach(x => {
        rows.push({
          title: 'Child ไม่อัปเดตนาน',
          text: `${x.key} - ${x.updatedDaysAgo} วัน`
        });
      });

      document.getElementById('insightsList').innerHTML = rows.length
        ? rows.map(r => `
            <div class="mini-item">
              <div class="summary">${esc(r.title)}</div>
              <div class="muted">${esc(r.text)}</div>
            </div>
          `).join('')
        : `<div class="empty">ยังไม่พบ insight</div>`;
    }

    function parentMatches(parentRow, query, squad, risk) {
      const q = query.trim().toLowerCase();

      const hay = [
        parentRow.parent.key,
        parentRow.parent.summary,
        parentRow.parent.status,
        parentRow.squad,
        ...(parentRow.children || []).map(x => `${x.key} ${x.summary} ${x.assignee || ''}`),
        ...(parentRow.linked || []).map(x => `${x.key} ${x.summary}`)
      ].join(' ').toLowerCase();

      if (q && !hay.includes(q)) return false;
      if (squad && !(parentRow.squads || []).includes(squad) && parentRow.squad !== squad) return false;
      if (risk && !(parentRow.riskFlags || []).includes(risk)) return false;

      return true;
    }

    function renderPortfolio(rows) {
      const wrap = document.getElementById('portfolioWrap');
      document.getElementById('resultCount').textContent = `${rows.length} parent items`;

      if (!rows.length) {
        wrap.innerHTML = `<div class="empty">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</div>`;
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="min-width:340px">Parent</th>
              <th>Owner Squad</th>
              <th style="min-width:180px">Progress</th>
              <th>Counts</th>
              <th style="min-width:220px">Risk</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>
                  <div class="summary">
                    <a class="key" href="${r.parent.browseUrl}" target="_blank">${esc(r.parent.key)}</a>
                    &nbsp; ${esc(r.parent.summary)}
                  </div>
                  <div class="muted" style="margin-bottom:8px">
                    <span class="badge ${badgeClass(r.parent.status)}">${esc(r.parent.status || '-')}</span>
                    ${r.parent.issueType ? ` <span class="badge b-slate">${esc(r.parent.issueType)}</span>` : ''}
                  </div>
                  ${(r.children || []).slice(0, 4).map(c => `
                    <div class="muted" style="margin-top:4px">
                      ↳ <a class="key" href="${c.browseUrl}" target="_blank">${esc(c.key)}</a>
                      ${esc(c.summary)} ${c.sprint ? `· Sprint ${esc(c.sprint)}` : ''}
                    </div>
                  `).join('')}
                  ${r.childrenCount > 4 ? `<div class="muted" style="margin-top:4px">และอีก ${r.childrenCount - 4} child items</div>` : ''}
                </td>
                <td>
                  <div class="summary">${esc(r.squad || '-')}</div>
                  <div class="muted">${(r.squads || []).join(', ') || '-'}</div>
                </td>
                <td>
                  <div class="progress"><div style="width:${r.progressPercent || 0}%"></div></div>
                  <div class="muted">${r.progressPercent || 0}% done from child completion</div>
                </td>
                <td>
                  <div class="muted">Children: ${r.childrenCount}</div>
                  <div class="muted">Linked: ${r.linkedCount}</div>
                  <div class="muted">Tests: ${r.testCaseCount}</div>
                  <div class="muted">Attachments: ${r.attachmentCount}</div>
                </td>
                <td>
                  <div class="risk-list">
                    ${(r.riskFlags || []).length
                      ? r.riskFlags.map(riskBadge).join('')
                      : `<span class="badge b-green">Healthy</span>`}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function applyFilters() {
      if (!dashboardData) return;

      const query = document.getElementById('searchInput').value || '';
      const squad = document.getElementById('squadFilter').value || '';
      const risk = document.getElementById('riskFilter').value || '';

      filteredParents = (dashboardData.parents || []).filter(x =>
        parentMatches(x, query, squad, risk)
      );

      renderPortfolio(filteredParents);
    }

    async function loadDashboard() {
      const wrap = document.getElementById('portfolioWrap');
      wrap.innerHTML = `<div class="loading">กำลังโหลดข้อมูลจาก Jira...</div>`;

      try {
        const data = await fetchDashboard();
        dashboardData = data;
        filteredParents = data.parents || [];

        renderSummary(data.summary || {});
        renderSquadSummary(data.squadSummary || []);
        renderInsights(data);
        renderPortfolio(filteredParents);

        const ts = new Date(data.generatedAt || Date.now());
        document.getElementById('syncTime').textContent =
          `อัปเดตล่าสุด: ${ts.toLocaleString('th-TH')}`;
      } catch (err) {
        wrap.innerHTML = `<div class="empty" style="color:#b91c1c">โหลดข้อมูลไม่สำเร็จ: ${esc(err.message)}</div>`;
        document.getElementById('syncTime').textContent = 'โหลดข้อมูลไม่สำเร็จ';
      }
    }

    loadDashboard();
  </script>
</body>
</html>
