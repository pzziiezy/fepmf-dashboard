<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FEPMF Calendar Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="page">
    <section class="header">
      <div class="header-top">
        <div>
          <h1 class="title">Sprint Calendar Planner</h1>
          <div class="subtitle">แสดง FEPMF ระดับ Parent (และแผน Manual) ครอบคลุม 2 เดือน: ปัจจุบัน + เดือนถัดไป</div>
        </div>
        <nav class="nav">
          <a href="/">Overview</a>
          <a class="active" href="/calendar.html">Calendar Planner</a>
          <a href="/shift-planner.html">Shift Planner</a>
        </nav>
      </div>
      <div class="header-meta">
        <span class="tag" id="calendarSync">กำลังโหลดข้อมูล...</span>
      </div>
    </section>

    <section class="panel" style="margin-top:12px;padding:12px">
      <div class="filter-grid">
        <input id="calendarSearch" class="search" placeholder="ค้นหา FEPMF key หรือ Summary" />
        <div id="calendarStatusFilter" class="multi"></div>
        <input id="calendarMonthPicker" class="search" type="month" />
      </div>
    </section>

    <section class="panel timeline-shell">
      <div class="notice" id="calendarSummary"></div>
      <div class="timeline-grid" id="timelineGrid"></div>
      <div id="timelineControls" style="margin-top:10px;display:flex;justify-content:center"></div>
    </section>

    <section class="panel" style="padding:14px;margin-top:14px">
      <h2 style="margin:0;font-size:20px">เพิ่ม New Project / Initiative</h2>
      <div class="notice">รายการ Manual ใช้สำหรับวางแผนทับซ้อน โดยไม่สร้างงานใน Jira</div>
      <form id="planForm" class="form-grid">
        <label class="field"><span>Project Title *</span><input name="title" required /></label>
        <label class="field"><span>Key (optional)</span><input name="key" /></label>
        <label class="field"><span>Sprint</span><input name="sprint" /></label>
        <label class="field"><span>Start Date *</span><input type="date" name="start" required /></label>
        <label class="field"><span>End Date *</span><input type="date" name="end" required /></label>
        <label class="field"><span>Owner</span><input name="owner" /></label>
        <label class="field full"><span>Note</span><textarea name="note"></textarea></label>
        <div class="full" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <button id="savePlanBtn" class="btn primary" type="submit">บันทึกแผนงาน</button>
          <button id="cancelEditBtn" class="btn" type="button" style="display:none">ยกเลิกแก้ไข</button>
          <span id="editModeLabel" class="badge b-status" style="display:none">Editing</span>
          <span id="planStatus" class="notice"></span>
        </div>
      </form>
    </section>

    <section class="panel" style="padding:14px;margin-top:14px">
      <h2 style="margin:0;font-size:20px">Manual Plans</h2>
      <div class="list" id="manualList"></div>
    </section>
  </div>
  <script src="/calendar.js"></script>
</body>
</html>
